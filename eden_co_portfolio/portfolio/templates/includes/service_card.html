<article class="grid grid-cols-1 lg:grid-cols-12 gap-8 py-12 border-b border-ghost group cursor-pointer hover:bg-surface-container/30 transition-colors px-4 -mx-4">
    <div class="lg:col-span-1">
        <span class="font-mono text-sm text-outline">{{ number }}</span>
    </div>
    <div class="lg:col-span-4">
        <h3 class="font-display text-2xl md:text-3xl font-semibold text-crisp group-hover:text-cobalt transition-colors">{{ title }}</h3>
    </div>
    <div class="lg:col-span-5">
        <p class="font-body text-base text-on-surface-variant leading-relaxed">{{ description }}</p>
    </div>
    <div class="lg:col-span-2 flex items-center justify-end">
        <span class="font-mono text-xs tracking-label uppercase text-on-surface-variant">{{ price }}</span>
    </div>
</article>
