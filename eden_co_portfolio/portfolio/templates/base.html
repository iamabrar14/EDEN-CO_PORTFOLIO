{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{% block meta_description %}EDEN & CO — The architecture of physical and digital systems. We engineer permanence across disciplines.{% endblock %}" />
    <meta name="keywords" content="architecture, interior design, software engineering, digital systems, strategy, EDEN & CO" />
    <title>{% block title %}EDEN & CO{% endblock %}</title>

    <!-- Fonts: Bodoni Moda (Display), Hanken Grotesk (Body), JetBrains Mono (Labels) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,600;0,6..96,700;1,6..96,400;1,6..96,500;1,6..96,600;1,6..96,700&family=Hanken+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS CDN with Custom Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: {
                            DEFAULT: '#111415',
                            deep: '#0A0C10',
                            container: '#1d2021',
                            'container-high': '#282a2b',
                            bright: '#373a3b',
                        },
                        'on-surface': {
                            DEFAULT: '#E1E3E4',
                            variant: '#c6c6cb',
                        },
                        outline: {
                            DEFAULT: '#909095',
                            variant: '#45474b',
                        },
                        cobalt: {
                            DEFAULT: '#2E5BFF',
                            dark: '#1a3fcc',
                        },
                        gold: {
                            DEFAULT: '#C5A059',
                            dim: '#967533',
                        },
                        crisp: '#F8F9FA',
                        ghost: 'rgba(255, 255, 255, 0.1)',
                    },
                    fontFamily: {
                        display: ['"Bodoni Moda"', 'serif'],
                        body: ['"Hanken Grotesk"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    spacing: {
                        'section': '160px',
                        'section-mobile': '80px',
                    },
                    letterSpacing: {
                        'label': '0.1em',
                        'tight-display': '-0.02em',
                    },
                    borderRadius: {
                        'none': '0px',
                    },
                },
            },
        }
    </script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-surface-deep text-on-surface font-body antialiased {% block body_class %}{% endblock %}">

    {% include "includes/navbar.html" %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include "includes/footer.html" %}

    {% block extra_scripts %}{% endblock %}
</body>
</html>
